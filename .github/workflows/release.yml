name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          uv sync
      
      - name: Build executable
        run: |
          uv run pyinstaller connectify.spec
      
      - name: Create release archive
        run: |
          cd dist
          tar -czf connectify-macos-arm64.tar.gz connectify/
          cd ..
      
      - name: Get version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Connectify ${{ steps.get_version.outputs.version }}
          body: |
            # Connectify - SSH Session Manager for macOS
            
            ## Installation
            
            ```bash
            curl -LsSf https://raw.githubusercontent.com/rahulbhooteshwar/iterm2-ssh-session-manager/main/install.sh | sh
            ```
            
            ## What's New
            
            - SSH session management with iTerm2 integration
            - Web UI with background server support
            - Auto-start configuration
            - Secure credential storage in macOS Keychain
            
            ## Requirements
            
            - macOS (Apple Silicon or Intel)
            - iTerm2
            
            See [README](https://github.com/rahulbhooteshwar/iterm2-ssh-session-manager) for full documentation.
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/connectify-macos-arm64.tar.gz
          asset_name: connectify-macos-arm64.tar.gz
          asset_content_type: application/gzip
      
      - name: Update latest tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f latest
          git push origin latest --force
