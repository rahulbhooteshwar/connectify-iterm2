name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          uv sync
      
      - name: Build executable
        run: |
          uv run pyinstaller connectify.spec
      
      - name: Create release archive
        run: |
          cd dist
          tar -czf connectify-macos-arm64.tar.gz connectify/
          cd ..
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/connectify-macos-arm64.tar.gz
          body: |
            # Connectify - SSH Session Manager for macOS
            
            ## Installation
            
            ```bash
            curl -LsSf https://raw.githubusercontent.com/rahulbhooteshwar/connectify-iterm2/main/install.sh | sh
            ```
            
            ## What's New
            
            - SSH session management with iTerm2 integration
            - Web UI with background server support
            - Auto-start configuration
            - Secure credential storage in macOS Keychain
            
            ## Requirements
            
            - macOS (Apple Silicon or Intel)
            - iTerm2
            
            ## Usage
            
            ```bash
            connectify                    # Interactive SSH session selector
            connectify --add              # Add a new SSH host
            connectify ui start           # Start background UI server
            connectify --help             # Show all options
            ```
            
            See [README](https://github.com/rahulbhooteshwar/connectify-iterm2) for full documentation.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
